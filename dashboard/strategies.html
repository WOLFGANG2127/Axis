<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>AXIS — Strategy Hub</title>
  <meta name="description" content="AXIS Strategy Hub — Live performance ranking for all active Nifty/BankNifty options strategies.">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg:          #0a0f1e;
      --surface:     #111827;
      --surface-2:   #1e293b;
      --border:      #1e3a5f;
      --accent:      #3b82f6;
      --accent-glow: rgba(59,130,246,0.15);
      --green:       #10b981;
      --red:         #ef4444;
      --yellow:      #f59e0b;
      --purple:      #8b5cf6;
      --text:        #f1f5f9;
      --muted:       #64748b;
      --muted-2:     #94a3b8;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: 'Inter', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
    }

    /* ── Nav ───────────────────────────────────────────────────────────────── */
    nav {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 16px 32px;
      border-bottom: 1px solid var(--border);
      background: rgba(10,15,30,0.9);
      backdrop-filter: blur(12px);
      position: sticky; top: 0; z-index: 100;
    }
    .nav-logo { font-size: 1.25rem; font-weight: 700; color: var(--accent); letter-spacing: -0.02em; }
    .nav-links { display: flex; gap: 24px; align-items: center; }
    .nav-links a {
      color: var(--muted-2); text-decoration: none; font-size: 0.9rem; font-weight: 500;
      transition: color 0.2s;
    }
    .nav-links a:hover, .nav-links a.active { color: var(--text); }
    .nav-links a.active { border-bottom: 2px solid var(--accent); padding-bottom: 2px; }

    /* ── Page layout ─────────────────────────────────────────────────────────── */
    .page { max-width: 1200px; margin: 0 auto; padding: 32px 24px; }
    .page-header { margin-bottom: 32px; }
    .page-header h1 { font-size: 1.75rem; font-weight: 700; margin-bottom: 6px; }
    .page-header p { color: var(--muted-2); }

    /* ── Strategy grid ───────────────────────────────────────────────────────── */
    .strategy-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(340px, 1fr));
      gap: 20px;
    }

    /* ── Strategy card ───────────────────────────────────────────────────────── */
    .strategy-card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 16px;
      padding: 24px;
      position: relative;
      overflow: hidden;
      transition: border-color 0.2s, transform 0.15s;
      cursor: pointer;
      text-decoration: none;
      display: block;
      color: inherit;
    }
    .strategy-card:hover {
      border-color: var(--accent);
      transform: translateY(-2px);
    }
    .strategy-card::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 3px;
      background: linear-gradient(90deg, var(--accent), var(--purple));
    }
    .strategy-card.best::before {
      background: linear-gradient(90deg, var(--green), var(--accent));
    }

    .card-header {
      display: flex;
      justify-content: space-between;
      align-items: flex-start;
      margin-bottom: 16px;
    }
    .card-name { font-size: 1.05rem; font-weight: 600; }
    .card-id { font-size: 0.75rem; color: var(--muted); font-family: monospace; margin-top: 2px; }

    .badge {
      font-size: 0.7rem; font-weight: 600; padding: 3px 8px; border-radius: 99px;
      text-transform: uppercase; letter-spacing: 0.04em;
    }
    .badge-shadow  { background: rgba(245,158,11,0.15); color: var(--yellow); }
    .badge-enforce { background: rgba(16,185,129,0.15); color: var(--green); }
    .badge-best    { background: rgba(59,130,246,0.15); color: var(--accent); }

    .card-metrics {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric { }
    .metric-label { font-size: 0.72rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .metric-value { font-size: 1.15rem; font-weight: 600; margin-top: 4px; }

    .card-footer {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding-top: 14px;
      border-top: 1px solid var(--border);
      font-size: 0.82rem;
      color: var(--muted-2);
    }
    .card-footer a {
      color: var(--accent); text-decoration: none; font-weight: 500; font-size: 0.82rem;
    }

    /* ── Empty / Insufficient states ─────────────────────────────────────────── */
    .empty-state {
      text-align: center;
      padding: 48px 24px;
      background: var(--surface);
      border: 1px dashed var(--border);
      border-radius: 16px;
    }
    .empty-icon { font-size: 3rem; margin-bottom: 16px; }
    .empty-state h3 { font-size: 1.1rem; margin-bottom: 8px; }
    .empty-state p { color: var(--muted-2); font-size: 0.9rem; line-height: 1.6; }
    .empty-note {
      margin-top: 12px !important;
      font-size: 0.82rem !important;
      color: var(--muted) !important;
      background: var(--surface-2);
      padding: 10px 16px;
      border-radius: 8px;
      border: 1px solid var(--border);
      text-align: left;
    }
    .progress-bar-wrap {
      background: var(--surface-2);
      border-radius: 99px;
      height: 6px;
      margin: 16px auto;
      max-width: 280px;
      overflow: hidden;
    }
    .progress-bar {
      height: 100%;
      background: linear-gradient(90deg, var(--accent), var(--purple));
      border-radius: 99px;
      transition: width 0.5s ease;
    }
    .progress-label { font-size: 0.8rem; color: var(--muted-2); margin-top: 4px; }

    /* ── Skeleton loader ─────────────────────────────────────────────────────── */
    .skeleton {
      background: linear-gradient(90deg, var(--surface) 25%, var(--surface-2) 50%, var(--surface) 75%);
      background-size: 200% 100%;
      animation: shimmer 1.4s infinite;
      border-radius: 8px;
    }
    @keyframes shimmer { to { background-position: -200% 0; } }

    /* ── Config modal ────────────────────────────────────────────────────────── */
    #config-modal { display: flex; }

    /* ── pnl ────────────────────────────────────────────────────────────────── */
    .pnl-positive { color: var(--green); }
    .pnl-negative { color: var(--red); }

    @media (max-width: 640px) {
      nav { padding: 12px 16px; }
      .page { padding: 20px 16px; }
      .strategy-grid { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

  <!-- Config modal injected by JS -->

  <nav>
    <div class="nav-logo">AXIS</div>
    <div class="nav-links">
      <a href="index.html">Dashboard</a>
      <a href="strategies.html" class="active">Strategies</a>
      <a href="#" id="btn-open-config" style="color:var(--muted);font-size:0.8rem;">⚙ Config</a>
    </div>
  </nav>

  <div class="page">
    <div class="page-header">
      <h1>Strategy Hub</h1>
      <p>All active strategies. Rankings require ≥ 15 closed trades to display.</p>
    </div>

    <div id="strategy-grid" class="strategy-grid">
      <!-- Loading skeletons -->
      <div class="strategy-card" style="pointer-events:none;">
        <div class="skeleton" style="height:20px;width:60%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:40%;margin-bottom:20px;"></div>
        <div class="card-metrics">
          <div class="skeleton" style="height:40px;"></div>
          <div class="skeleton" style="height:40px;"></div>
          <div class="skeleton" style="height:40px;"></div>
        </div>
      </div>
      <div class="strategy-card" style="pointer-events:none;">
        <div class="skeleton" style="height:20px;width:60%;margin-bottom:8px;"></div>
        <div class="skeleton" style="height:12px;width:40%;margin-bottom:20px;"></div>
        <div class="card-metrics">
          <div class="skeleton" style="height:40px;"></div>
          <div class="skeleton" style="height:40px;"></div>
          <div class="skeleton" style="height:40px;"></div>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="shared.js"></script>
  <script>
    const MIN_FLOOR = 15;

    // Inject config modal
    document.body.insertAdjacentHTML('afterbegin', CONFIG_MODAL_HTML);
    document.getElementById('btn-save-config').onclick = () => saveConfig(initPage);
    document.getElementById('btn-open-config').onclick = (e) => {
        e.preventDefault();
        document.getElementById('config-modal').style.display = 'flex';
    };

    async function initPage() {
        const sb = getSupabase();
        if (!sb) return;

        // Set up shared Realtime channel (ONE for all strategy tabs)
        getSharedChannel(sb);
        onSharedChannelEvent({
            table: 'trade_outcomes',
            callback: () => initPage(), // re-render cards on new outcomes
        });

        // Netlify health + honesty state
        pollNetlifyHealth();
        setInterval(pollNetlifyHealth, 60000);

        const grid = document.getElementById('strategy-grid');

        // Fetch all active strategies
        const { data: strategies, error: sErr } = await sb
            .from('strategies')
            .select('strategy_id, display_name, status, version, source, created_at')
            .eq('status', 'active')
            .order('display_name');

        if (sErr || !strategies || strategies.length === 0) {
            grid.innerHTML = `
              <div class="empty-state" style="grid-column:1/-1;">
                <div class="empty-icon">🏗️</div>
                <h3>No Active Strategies</h3>
                <p>No strategies with <code>status = 'active'</code> found in the database.<br>
                   Strategies are activated via the admin workflow after passing security review.</p>
              </div>`;
            return;
        }

        // Fetch outcome counts per strategy (for 15-floor gate)
        const { data: outcomes } = await sb
            .from('trade_outcomes')
            .select('strategy_id')
            .in('status', ['WIN', 'LOSS', 'BREAKEVEN'])
            .order('strategy_id');

        // Count per strategy
        const countMap = {};
        (outcomes || []).forEach(r => {
            countMap[r.strategy_id] = (countMap[r.strategy_id] || 0) + 1;
        });

        // Determine best strategy (profit_factor primary, win_rate secondary)
        // Only if at least one strategy has ≥ MIN_FLOOR trades
        const { data: accData } = await sb
            .from('trade_outcomes')
            .select('strategy_id, pnl_rupees, status')
            .in('status', ['WIN', 'LOSS', 'BREAKEVEN']);

        const perf = {};
        (accData || []).forEach(r => {
            if (!perf[r.strategy_id]) perf[r.strategy_id] = { wins: 0, losses: 0, grossWin: 0, grossLoss: 0 };
            const p = Number(r.pnl_rupees || 0);
            if (r.status === 'WIN')  { perf[r.strategy_id].wins++;   perf[r.strategy_id].grossWin += p; }
            if (r.status === 'LOSS') { perf[r.strategy_id].losses++; perf[r.strategy_id].grossLoss += Math.abs(p); }
        });

        let bestStrategyId = null;
        let bestScore = -Infinity;
        strategies.forEach(s => {
            const count = countMap[s.strategy_id] || 0;
            if (count >= MIN_FLOOR) {
                const p = perf[s.strategy_id] || {};
                const pf = p.grossLoss > 0 ? p.grossWin / p.grossLoss : (p.grossWin > 0 ? Infinity : 0);
                const wr = (p.wins + p.losses) > 0 ? p.wins / (p.wins + p.losses) : 0;
                const score = pf * 1000 + wr; // profit factor primary
                if (score > bestScore) { bestScore = score; bestStrategyId = s.strategy_id; }
            }
        });

        grid.innerHTML = '';
        strategies.forEach(s => {
            const count = countMap[s.strategy_id] || 0;
            const p = perf[s.strategy_id] || {};
            const total = p.wins + p.losses;
            const winRate = total > 0 ? Math.round((p.wins / total) * 100) : null;
            const profitFactor = p.grossLoss > 0 ? (p.grossWin / p.grossLoss).toFixed(2) : null;
            const isBest = s.strategy_id === bestStrategyId;

            const card = document.createElement('a');
            card.className = 'strategy-card' + (isBest ? ' best' : '');
            card.href = `strategy.html?id=${encodeURIComponent(s.strategy_id)}`;

            const meetsFloor = count >= MIN_FLOOR;

            const winRateHtml = meetsFloor && winRate !== null
                ? `<div class="metric-value">${winRate}%</div>`
                : `<div class="metric-value" style="color:var(--muted)">—</div>`;
            const pfHtml = meetsFloor && profitFactor !== null
                ? `<div class="metric-value">${profitFactor}</div>`
                : `<div class="metric-value" style="color:var(--muted)">—</div>`;
            const tradeHtml = `<div class="metric-value">${count}</div>`;

            // Insufficient data notice (inline in card, below metrics)
            const insufficientHtml = !meetsFloor ? `
              <div style="font-size:0.8rem;color:var(--yellow);background:rgba(245,158,11,0.08);
                          border:1px solid rgba(245,158,11,0.2);border-radius:6px;
                          padding:6px 10px;margin-bottom:12px;">
                ⚠ Ranking requires ${MIN_FLOOR} trades — ${count}/${MIN_FLOOR} recorded
              </div>` : '';

            const bestBadge = isBest
                ? `<span class="badge badge-best">★ Best</span>`
                : `<span class="badge badge-shadow">SHADOW</span>`;

            card.innerHTML = `
              <div class="card-header">
                <div>
                  <div class="card-name">${s.display_name}</div>
                  <div class="card-id">${s.strategy_id} · v${s.version}</div>
                </div>
                ${bestBadge}
              </div>
              ${insufficientHtml}
              <div class="card-metrics">
                <div class="metric">
                  <div class="metric-label">Trades</div>
                  ${tradeHtml}
                </div>
                <div class="metric">
                  <div class="metric-label">Win Rate</div>
                  ${winRateHtml}
                </div>
                <div class="metric">
                  <div class="metric-label">Profit Factor</div>
                  ${pfHtml}
                </div>
              </div>
              <div class="card-footer">
                <span>Source: ${s.source}</span>
                <a href="strategy.html?id=${encodeURIComponent(s.strategy_id)}">View Details →</a>
              </div>`;
            grid.appendChild(card);
        });
    }

    checkAndBootstrap(initPage);
  </script>
</body>
</html>
