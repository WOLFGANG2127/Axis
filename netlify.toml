[build]
  command = "pip install -r requirements.txt"
  publish = "public"

[functions]
  directory = "netlify/functions"
  node_bundler = "esbuild"

[[redirects]]
  from = "/health"
  to = "/.netlify/functions/health"
  status = 200

[[redirects]]
  from = "/telegram/webhook"
  to = "/.netlify/functions/telegram_webhook"
  status = 200
