name: No-Trade Day Summary

on:
  workflow_dispatch: 

jobs:
  run-summary:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'
          
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          
      - name: FORCE INJECT SECRETS TO .ENV FILE
        run: |
          echo 'GOOGLE_API_KEY="AIzaSyDummyKey_FormatXyz1234567890"' > .env
          echo 'GROQ_API_KEY="gsk_dummy_groq_key_abcdefghijklmnopqrstuvwx"' >> .env
          echo 'ZAI_API_KEY="zai_dummy_key_1234567890abcdef"' >> .env
          echo 'TELEGRAM_BOT_TOKEN="123456789:ABCdefGhIJKlmNoPQRsTUVwxyZ"' >> .env
          echo 'TELEGRAM_CHAT_ID="123456789"' >> .env
          echo 'TELEGRAM_WEBHOOK_SECRET="dummy_webhook_secret_value_xyz"' >> .env
          echo 'DHAN_CLIENT_ID="1234567890"' >> .env
          echo 'DHAN_ACCESS_TOKEN="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy_dhan_access_token"' >> .env
          echo 'DHAN_TOTP_SECRET="JBSWY3DPEHPK3PXP"' >> .env
          echo 'DHAN_PIN="1234"' >> .env
          echo 'SUPABASE_URL="https://dummyprojectid.supabase.co"' >> .env
          echo 'SUPABASE_ANON_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy_supabase_anon_key"' >> .env
          echo 'SUPABASE_SERVICE_ROLE_KEY="eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.dummy_supabase_service_role_key"' >> .env
          echo 'AXIS_MONTHLY_EXPIRIES="[]"' >> .env
          
      - name: Run No-Trade Day Summary
        run: |
          export PYTHONPATH=$PYTHONPATH:$(pwd)
          python src/scheduling/no_trade_summary.py
