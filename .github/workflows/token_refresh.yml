name: Token Refresh

on:
  schedule:
    - cron: '0 */8 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'src/data/dhan_client.py'
      - 'src/scheduling/token_refresher.py'
      - 'src/config/settings.py'
      - '.github/workflows/**'

jobs:
  refresh:
    runs-on: ubuntu-latest
    env:
      GOOGLE_API_KEY: ${{ secrets.GOOGLE_API_KEY }}
      GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
      ZAI_API_KEY: ${{ secrets.ZAI_API_KEY }}
      TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
      TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
      TELEGRAM_WEBHOOK_SECRET: ${{ secrets.TELEGRAM_WEBHOOK_SECRET }}
      DHAN_CLIENT_ID: ${{ secrets.DHAN_CLIENT_ID }}
      DHAN_ACCESS_TOKEN: ${{ secrets.DHAN_ACCESS_TOKEN }}
      DHAN_TOTP_SECRET: ${{ secrets.DHAN_TOTP_SECRET }}
      DHAN_PIN: ${{ secrets.DHAN_PIN }}
      SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
      SUPABASE_ANON_KEY: ${{ secrets.SUPABASE_ANON_KEY }}
      SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
      AXIS_MONTHLY_EXPIRIES: ${{ secrets.AXIS_MONTHLY_EXPIRIES }}
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          ref: main
          fetch-depth: 1
        
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          
      - name: Install system dependencies
        run: sudo apt-get update && sudo apt-get install -y libmagic1

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Verify Checked Out Code
        run: |
          echo "=== Current Commit ==="
          git log -1 --oneline
          echo "=== Auth Fix Verification ==="
          python -c "
          with open('src/data/dhan_client.py') as f:
              text = f.read()
          print('params= present:', 'params=' in text)
          print('status_code >= 400 present:', 'status_code >= 400' in text)
          lines = text.splitlines()
          for i, line in enumerate(lines[130:150], start=131):
              print(f'{i}: {line}')
          "
          
      - name: Run Token Refresher
        run: |
          python -c "import asyncio; from src.scheduling.token_refresher import refresh_if_needed; asyncio.run(refresh_if_needed())"
